[build]
  publish = "."

[[redirects]]
  from = "/portofolio"
  to   = "/index.html"
  status = 200

[[redirects]]
  from = "/project/dokumentasi-asat-tahun-2026"
  to   = "/project/dokumentasi-asat-tahun-2026.html"
  status = 200

[[redirects]]
  from = "/project/donghua"
  to   = "/project/donghua.html"
  status = 200

[[redirects]]
  from = "/project/raisaver"
  to   = "/project/raisaver.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
