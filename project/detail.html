<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Detail — Andhika Rafi</title>
  <meta name="robots" content="noindex, follow" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon-circle.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    :root {
      --bg: #080808;
      --bg-2: #0f0f0f;
      --card-bg: rgba(255,255,255,0.04);
      --card-bg-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --text: #f0f0f0;
      --text-muted: #888;
      --text-dim: #444;
      --radius: 14px;
      --radius-sm: 8px;
      --radius-xs: 5px;
      --radius-full: 9999px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font-mono: 'JetBrains Mono', monospace;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse at 50% 30%, black 20%, transparent 70%);
    }

    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,8,8,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border); padding: 0.9rem 2rem;
    }
    .topbar-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.45rem;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--text-muted); padding: 0.4rem 0.9rem;
      border-radius: var(--radius-full); font-size: 0.78rem; font-weight: 500;
      transition: var(--transition);
    }
    .back-btn:hover { background: rgba(255,255,255,0.09); border-color: var(--border-hover); color: var(--text); }
    .back-btn svg { width: 13px; height: 13px; }
    .breadcrumb {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.78rem; color: var(--text-dim);
    }
    .breadcrumb span { color: var(--text-muted); }
    .breadcrumb .current { color: var(--text); font-weight: 500; }

    .main {
      max-width: 1100px; margin: 0 auto;
      padding: 3rem 2rem 5rem; position: relative; z-index: 1;
    }

    .hero-row {
      display: grid; grid-template-columns: 1fr 1.1fr;
      gap: 3rem; align-items: start; margin-bottom: 2.5rem;
    }
    .hero-left { display: flex; flex-direction: column; }

    .proj-label {
      font-family: var(--font-mono); font-size: 0.68rem;
      color: var(--text-dim); letter-spacing: 0.15em;
      text-transform: uppercase; margin-bottom: 0.75rem;
    }
    .project-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800; line-height: 1.1;
      letter-spacing: -0.04em; color: var(--text); margin-bottom: 0.5rem;
    }
    .title-underline {
      width: 40px; height: 2px; border-radius: 1px;
      background: var(--text-muted); margin-bottom: 1.5rem; opacity: 0.5;
    }
    .project-long-desc {
      font-size: 0.92rem; line-height: 1.85; color: var(--text-muted);
      font-weight: 400; margin-bottom: 2rem;
    }

    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; margin-bottom: 2rem;
      border: 1px solid var(--border); border-radius: var(--radius-xs); overflow: hidden;
    }
    .stat-card {
      background: var(--card-bg); padding: 1rem 1.1rem;
      display: flex; align-items: center; gap: 0.85rem;
      transition: var(--transition); border-right: 1px solid var(--border);
    }
    .stat-card:last-child { border-right: none; }
    .stat-card:hover { background: var(--card-bg-hover); }
    .stat-icon {
      width: 34px; height: 34px; border-radius: var(--radius-xs);
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .stat-icon svg { width: 15px; height: 15px; color: var(--text-muted); }
    .stat-num { font-size: 1.25rem; font-weight: 700; color: var(--text); line-height: 1; }
    .stat-label { font-size: 0.68rem; color: var(--text-dim); margin-top: 0.15rem; letter-spacing: 0.03em; }

    .action-buttons { display: flex; gap: 0.65rem; margin-bottom: 2.5rem; flex-wrap: wrap; }
    .action-btn {
      display: inline-flex; align-items: center; gap: 0.45rem;
      padding: 0.65rem 1.2rem; border-radius: var(--radius-xs);
      font-size: 0.82rem; font-weight: 600; transition: var(--transition);
      border: 1px solid transparent;
    }
    .action-btn svg { width: 14px; height: 14px; }
    .action-btn-demo {
      background: var(--text); color: #000;
    }
    .action-btn-demo:hover { background: #d0d0d0; }
    .action-btn-demo[style*="opacity"] {
      background: rgba(255,255,255,0.08); border-color: var(--border);
      color: var(--text-muted);
    }
    .action-btn-github {
      background: rgba(255,255,255,0.05); border-color: var(--border);
      color: var(--text-muted);
    }
    .action-btn-github:hover { background: rgba(255,255,255,0.1); border-color: var(--border-hover); color: var(--text); }

    .tech-section-title {
      font-family: var(--font-mono); font-size: 0.68rem;
      color: var(--text-dim); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 0.75rem;
    }
    .tech-chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tech-chip {
      display: inline-flex; align-items: center; gap: 0.35rem;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-muted); padding: 0.32rem 0.75rem; border-radius: var(--radius-xs);
      font-size: 0.75rem; font-weight: 500; font-family: var(--font-mono);
      transition: var(--transition);
    }
    .tech-chip:hover { background: rgba(255,255,255,0.08); color: var(--text); border-color: var(--border-hover); }
    .tech-chip-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-muted); }

    .hero-right {}
    .project-image-frame {
      border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      background: #111; aspect-ratio: 16/10; position: relative;
    }
    .project-main-image {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.5s ease; filter: grayscale(10%);
    }
    .project-image-frame:hover .project-main-image { transform: scale(1.02); filter: grayscale(0%); }
    .project-image-placeholder {
      width: 100%; height: 100%; display: flex;
      align-items: center; justify-content: center;
      font-size: 3.5rem;
      background: var(--bg-2);
    }

    .state-center {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; gap: 1rem; color: var(--text-muted);
    }
    .state-center .icon { font-size: 2.5rem; }
    .state-center h2 { font-size: 1.4rem; color: var(--text); font-weight: 700; }
    .state-center p { font-size: 0.88rem; text-align: center; max-width: 340px; }

    @media (max-width: 768px) {
      .hero-row { grid-template-columns: 1fr; gap: 2rem; }
      .main { padding: 2rem 1.25rem 4rem; }
      .project-title { font-size: 2rem; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 480px) {
      .topbar { padding: 0.8rem 1.1rem; }
      .breadcrumb { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>

  <div class="topbar">
    <div class="topbar-inner">
      <a href="/portofolio" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back
      </a>
      <div class="breadcrumb">
        <span>Projects</span>
        <span>›</span>
        <span class="current" id="breadcrumbTitle">Loading...</span>
      </div>
    </div>
  </div>

  <main class="main" id="mainContent">
    <div class="state-center" id="loadingState">
      <div class="icon">⏳</div>
      <h2>Memuat...</h2>
      <p>Mengambil data proyek</p>
    </div>
  </main>

  <script>
    function getProjectId() {
      const params = new URLSearchParams(window.location.search);
      return parseInt(params.get('id'));
    }

    async function loadProject() {
      const id = getProjectId();
      if (!id) { showError('ID proyek tidak ditemukan.'); return; }
      try {
        const res = await fetch('/data.json');
        const data = await res.json();
        const project = data.projects.find(p => p.id === id);
        if (!project) { showError('Proyek tidak ditemukan.'); return; }
        renderProject(project);
      } catch (e) {
        showError('Gagal memuat data proyek.');
      }
    }

    function renderProject(p) {
      document.title = p.title + ' — Andhika Rafi';
      document.getElementById('breadcrumbTitle').textContent = p.title;

      const imgSrc = p.image ? (p.image.startsWith('http') ? p.image : `../${p.image}`) : null;
      const imageHTML = imgSrc
        ? `<img class="project-main-image" src="${imgSrc}" alt="${p.title}" loading="lazy" decoding="async" onerror="this.parentElement.innerHTML='<div class=\\'project-image-placeholder\\'>🖥️</div>'">`
        : `<div class="project-image-placeholder">🖥️</div>`;

      const techChipsHTML = p.tech.map(t => `
        <span class="tech-chip"><span class="tech-chip-dot"></span>${t}</span>`).join('');

      const demoHref = p.demo && p.demo !== '#' ? p.demo : null;
      const demoBtn = demoHref
        ? `<a href="${demoHref}" target="_blank" class="action-btn action-btn-demo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Live Demo
           </a>`
        : `<span class="action-btn action-btn-demo" style="opacity:0.35;cursor:default;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Live Demo
           </span>`;

      document.getElementById('mainContent').innerHTML = `
        <div class="hero-row">
          <div class="hero-left">
            <div class="proj-label">Project Detail</div>
            <h1 class="project-title">${p.title}</h1>
            <div class="title-underline"></div>
            <p class="project-long-desc">${p.longDesc || p.description}</p>
            <div class="stats-row">
              <div class="stat-card">
                <div class="stat-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                  </svg>
                </div>
                <div>
                  <div class="stat-num">${p.tech.length}</div>
                  <div class="stat-label">Teknologi</div>
                </div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
                  </svg>
                </div>
                <div>
                  <div class="stat-num">${new Date().getFullYear()}</div>
                  <div class="stat-label">Tahun</div>
                </div>
              </div>
            </div>
            <div class="action-buttons">
              ${demoBtn}
              <a href="${p.github}" target="_blank" class="action-btn action-btn-github">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                GitHub
              </a>
            </div>
            <div class="tech-section-title">Tech Stack</div>
            <div class="tech-chips">${techChipsHTML}</div>
          </div>
          <div class="hero-right">
            <div class="project-image-frame">${imageHTML}</div>
          </div>
        </div>
      `;
    }

    function showError(msg) {
      document.getElementById('mainContent').innerHTML = `
        <div class="state-center">
          <div class="icon">⚠️</div>
          <h2>Tidak Ditemukan</h2>
          <p>${msg}</p>
          <a href="/portofolio" style="margin-top:1.25rem;padding:0.55rem 1.2rem;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#888;font-size:0.82rem;">
            ← Kembali ke Portofolio
          </a>
        </div>`;
    }

    loadProject();
  </script>
</body>
</html>
