<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Reader — Andhika Rafi</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-size: 16px; }
    :root {
      --bg: #1a1a1a; --topbar-bg: #000;
      --border: rgba(255,255,255,0.12); --border-hover: rgba(255,255,255,0.28);
      --text: #fff; --text-muted: #b0b0b0; --text-dim: #555;
      --accent: rgba(255,255,255,0.9);
      --radius-full: 9999px; --transition: all 0.2s ease;
    }
    body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; display: flex; flex-direction: column; overflow: hidden; }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--topbar-bg); border-bottom: 1px solid var(--border);
      padding: 0 1.25rem; height: 52px;
      display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
      flex-shrink: 0; z-index: 20;
    }
    .tb-group { display: flex; align-items: center; gap: 0.5rem; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(255,255,255,0.07); border: 1px solid var(--border);
      color: var(--text-muted); padding: 0.35rem 0.85rem; border-radius: var(--radius-full);
      font-size: 0.78rem; font-weight: 500; transition: var(--transition); text-decoration: none; white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); border-color: var(--border-hover); }
    .back-btn svg { width: 13px; height: 13px; }

    .doc-title { font-size: 0.85rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
    .doc-badge { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.14); color: var(--text-dim); padding: 0.18rem 0.5rem; border-radius: 4px; text-transform: uppercase; }

    /* divider */
    .tb-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

    /* icon button */
    .tb-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text-muted); padding: 0.35rem 0.75rem; border-radius: var(--radius-full);
      font-size: 0.78rem; font-weight: 500; cursor: pointer;
      transition: var(--transition); white-space: nowrap; text-decoration: none;
      -webkit-user-select: none; user-select: none;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); border-color: var(--border-hover); }
    .tb-btn:disabled { opacity: 0.3; pointer-events: none; }
    .tb-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
    .tb-btn.primary { background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.24); color: var(--text); }
    .tb-btn.primary:hover { background: rgba(255,255,255,0.19); }
    .tb-btn.active { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.35); color: var(--text); }

    /* number input */
    .tb-input {
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      color: var(--text); border-radius: 7px; padding: 0.3rem 0.55rem;
      font-size: 0.78rem; text-align: center; outline: none;
      transition: var(--transition);
    }
    .tb-input:focus { border-color: var(--border-hover); background: rgba(255,255,255,0.1); }
    .tb-input::-webkit-inner-spin-button, .tb-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    #pageInput  { width: 46px; }
    #scaleInput { width: 52px; }

    .tb-label { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; }

    /* ── SEARCH MODAL ── */
    .modal-overlay {
      position: fixed;
      top: 52px;
      right: 1rem;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s ease, visibility 0.15s ease, transform 0.15s ease;
      transform: translateY(-8px);
    }
    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .modal-box {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
      overflow: hidden;
    }

    .modal-head {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 1rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-search-icon { color: var(--text-dim); flex-shrink: 0; }
    .modal-search-icon svg { width: 16px; height: 16px; }

    .modal-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: 0.95rem;
      placeholder-color: var(--text-dim);
    }
    .modal-input::placeholder { color: var(--text-dim); }

    .modal-count {
      font-size: 0.72rem; color: var(--text-dim);
      white-space: nowrap; min-width: 48px; text-align: right;
    }
    .modal-close-btn {
      background: rgba(255,255,255,0.07); border: 1px solid var(--border);
      color: var(--text-muted); width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; line-height: 1; flex-shrink: 0;
      transition: var(--transition);
    }
    .modal-close-btn:hover { background: rgba(255,255,255,0.14); color: var(--text); }

    .modal-results {
      max-height: 320px; overflow-y: auto;
      padding: 0.5rem 0;
    }
    .modal-results::-webkit-scrollbar { width: 4px; }
    .modal-results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    .result-item {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.65rem 1rem; cursor: pointer;
      transition: background 0.15s ease;
      border-radius: 0;
    }
    .result-item:hover { background: rgba(255,255,255,0.06); }
    .result-item.active { background: rgba(255,255,255,0.1); }

    .result-page {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em;
      color: var(--text-dim); background: rgba(255,255,255,0.07);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 0.15rem 0.45rem; white-space: nowrap; flex-shrink: 0;
      margin-top: 1px;
    }
    .result-text {
      font-size: 0.82rem; color: var(--text-muted); line-height: 1.5;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .result-text mark {
      background: rgba(255,220,0,0.35); color: var(--text);
      border-radius: 2px; padding: 0 1px;
    }

    .modal-empty {
      padding: 2rem 1rem; text-align: center;
      font-size: 0.82rem; color: var(--text-dim);
    }

    .modal-footer {
      border-top: 1px solid var(--border);
      padding: 0.55rem 1rem;
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .modal-nav { display: flex; gap: 0.35rem; }
    .modal-hint { font-size: 0.68rem; color: var(--text-dim); }

    /* ── VIEWER ── */
    #viewerScroll {
      flex: 1; overflow-y: auto; overflow-x: auto;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      padding: 1.5rem 1rem 3rem; gap: 1rem;
      scroll-behavior: smooth;
    }

    .pdf-page-wrap {
      position: relative;
      box-shadow: 0 4px 28px rgba(0,0,0,0.65);
      border-radius: 2px; line-height: 0; background: #fff;
      flex-shrink: 0;
    }
    .pdf-page-wrap canvas { display: block; }

    /* highlight layer */
    .pdf-page-wrap .textLayer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .search-highlight {
      position: absolute;
      background: rgba(255, 220, 0, 0.45);
      border-radius: 2px;
      pointer-events: none;
    }
    .search-highlight.current {
      background: rgba(255, 140, 0, 0.65);
    }

    /* STATE */
    .state-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; color: var(--text-muted); text-align: center; padding: 2rem; }
    .state-icon { font-size: 3rem; }
    .state-wrap h2 { font-size: 1.3rem; font-weight: 700; color: var(--text); }
    .state-wrap p  { font-size: 0.88rem; max-width: 420px; line-height: 1.7; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: rgba(255,255,255,0.55); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #viewerScroll::-webkit-scrollbar { width: 6px; }
    #viewerScroll::-webkit-scrollbar-track { background: transparent; }
    #viewerScroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); border-radius: 3px; }

    @media (max-width: 680px) {
      .doc-title { max-width: 100px; }
      .tb-btn span { display: none; }
      #scaleInput { width: 44px; }
    }
  </style>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">

  <!-- Left: back + title -->
  <div class="tb-group">
    <a href="../index.html#portofolio" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back
    </a>
    <span class="doc-title" id="docTitle">Memuat...</span>
    <span class="doc-badge">Read Only</span>
  </div>

  <!-- Center: page nav + zoom -->
  <div class="tb-group">
    <!-- Page nav -->
    <button class="tb-btn" id="prevBtn" disabled title="Halaman sebelumnya">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <input class="tb-input" id="pageInput" type="number" min="1" value="1" title="Nomor halaman" />
    <span class="tb-label" id="totalPages">/ —</span>
    <button class="tb-btn" id="nextBtn" disabled title="Halaman berikutnya">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <div class="tb-sep"></div>

    <!-- Zoom -->
    <button class="tb-btn" id="zoomOutBtn" title="Zoom out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <input class="tb-input" id="scaleInput" type="number" min="25" max="300" value="100" title="Zoom (%)" />
    <span class="tb-label">%</span>
    <button class="tb-btn" id="zoomInBtn" title="Zoom in">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Right: search + download -->
  <div class="tb-group">
    <button class="tb-btn" id="searchToggleBtn" title="Cari teks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Cari</span>
    </button>
    <div class="tb-sep"></div>
    <a class="tb-btn primary" id="downloadBtn" title="Download">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>Download</span>
    </a>
  </div>
</div>

<!-- ── SEARCH MODAL ── -->
<div class="modal-overlay" id="searchModal">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-search-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input class="modal-input" id="searchInput" type="text" placeholder="Cari teks dalam dokumen..." autocomplete="off" />
      <span class="modal-count" id="searchCount"></span>
      <button class="modal-close-btn" id="searchCloseBtn" title="Tutup (Esc)">×</button>
    </div>
    <div class="modal-results" id="searchResults">
      <div class="modal-empty" id="searchEmpty" style="display:none;">Tidak ditemukan</div>
    </div>
    <div class="modal-footer">
      <div class="modal-nav">
        <button class="tb-btn" id="searchPrevBtn" disabled title="Sebelumnya">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="tb-btn" id="searchNextBtn" disabled title="Berikutnya">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
      <span class="modal-hint">Enter ↓ &nbsp; Shift+Enter ↑ &nbsp; Esc tutup</span>
    </div>
  </div>
</div>

<!-- ── PDF VIEWER ── -->
<div id="viewerScroll">
  <div class="state-wrap" id="loadingState">
    <div class="spinner"></div>
    <h2>Memuat Dokumen</h2>
    <p>Harap tunggu sebentar...</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function () {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const params    = new URLSearchParams(location.search);
  const pdfParam  = params.get('pdf');
  const fileParam = params.get('file');
  const title     = params.get('title') || 'Dokumen';

  document.title = title + ' — Reader';
  document.getElementById('docTitle').textContent = title;

  const dlBtn = document.getElementById('downloadBtn');
  if (fileParam) { dlBtn.href = '../' + fileParam; dlBtn.download = title + '.docx'; }
  else dlBtn.style.display = 'none';

  if (!pdfParam) { showError('PDF tidak ditemukan.', 'Pastikan pdfFile diisi di data.json.'); return; }

  const scroll     = document.getElementById('viewerScroll');
  const DPR        = window.devicePixelRatio || 1;
  let pdfDoc       = null;
  let totalPages   = 0;
  let scalePercent = 100;          // user-facing %
  let baseScale    = 1.4;          // base scale (100% = 1.4 * DPR for sharpness)
  let pageWraps    = [];           // DOM wrappers per page
  let pageTexts    = [];           // [{str, items}] per page for search
  let searchMatches = [];          // [{pageNum, rects}]
  let searchCurrent = -1;

  // ── UI refs ──
  const pageInput    = document.getElementById('pageInput');
  const totalPagesEl = document.getElementById('totalPages');
  const prevBtn      = document.getElementById('prevBtn');
  const nextBtn      = document.getElementById('nextBtn');
  const scaleInput   = document.getElementById('scaleInput');
  const zoomInBtn    = document.getElementById('zoomInBtn');
  const zoomOutBtn   = document.getElementById('zoomOutBtn');
  const searchToggle = document.getElementById('searchToggleBtn');
  const searchModal  = document.getElementById('searchModal');
  const searchInput  = document.getElementById('searchInput');
  const searchCount  = document.getElementById('searchCount');
  const searchPrev   = document.getElementById('searchPrevBtn');
  const searchNext   = document.getElementById('searchNextBtn');
  const searchClose  = document.getElementById('searchCloseBtn');
  const searchResults = document.getElementById('searchResults');
  const searchEmpty  = document.getElementById('searchEmpty');

  // ── Load PDF ──
  pdfjsLib.getDocument('../' + pdfParam).promise.then(function (pdf) {
    pdfDoc      = pdf;
    totalPages  = pdf.numPages;
    document.getElementById('loadingState').remove();
    totalPagesEl.textContent = '/ ' + totalPages;
    pageInput.max = totalPages;
    prevBtn.disabled = false;
    nextBtn.disabled = false;
    renderAllPages();
  }).catch(function (err) {
    showError('Gagal memuat PDF.', err.message);
  });

  // ── Render all pages ──
  function renderAllPages() {
    scroll.innerHTML = '';
    pageWraps = [];
    pageTexts = [];
    for (let i = 1; i <= totalPages; i++) renderPage(i);
  }

  function getScale() {
    return baseScale * (scalePercent / 100);
  }

  function renderPage(num) {
    pdfDoc.getPage(num).then(function (page) {
      const s        = getScale();
      const viewport = page.getViewport({ scale: s * DPR });

      const wrap = document.createElement('div');
      wrap.className = 'pdf-page-wrap';
      wrap.dataset.page = num;

      const canvas     = document.createElement('canvas');
      canvas.width     = viewport.width;
      canvas.height    = viewport.height;
      canvas.style.width  = (viewport.width  / DPR) + 'px';
      canvas.style.height = (viewport.height / DPR) + 'px';

      const hlLayer = document.createElement('div');
      hlLayer.className = 'textLayer';
      hlLayer.style.width  = canvas.style.width;
      hlLayer.style.height = canvas.style.height;

      wrap.appendChild(canvas);
      wrap.appendChild(hlLayer);
      scroll.appendChild(wrap);
      pageWraps[num] = { wrap, hlLayer, viewport, page };

      page.render({ canvasContext: canvas.getContext('2d'), viewport });

      // Extract text for search
      page.getTextContent().then(function (tc) {
        pageTexts[num] = tc.items;
      });
    });
  }

  // ── Page navigation ──
  function scrollToPage(num) {
    num = Math.max(1, Math.min(totalPages, num));
    pageInput.value = num;
    const wrap = scroll.querySelector(`[data-page="${num}"]`);
    if (wrap) wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  pageInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      const v = parseInt(this.value);
      if (!isNaN(v)) scrollToPage(v);
    }
  });
  pageInput.addEventListener('blur', function () {
    const v = parseInt(this.value);
    if (!isNaN(v)) scrollToPage(v);
  });
  prevBtn.addEventListener('click', function () {
    const cur = parseInt(pageInput.value) || 1;
    scrollToPage(cur - 1);
  });
  nextBtn.addEventListener('click', function () {
    const cur = parseInt(pageInput.value) || 1;
    scrollToPage(cur + 1);
  });

  // Update pageInput on scroll
  scroll.addEventListener('scroll', function () {
    const wraps = scroll.querySelectorAll('.pdf-page-wrap');
    const midY  = scroll.scrollTop + scroll.clientHeight / 2;
    let closest = 1, minDist = Infinity;
    wraps.forEach(function (w) {
      const dist = Math.abs((w.offsetTop + w.offsetHeight / 2) - midY);
      if (dist < minDist) { minDist = dist; closest = parseInt(w.dataset.page); }
    });
    pageInput.value = closest;
  }, { passive: true });

  // ── Zoom ──
  function applyZoom() {
    scalePercent = Math.max(25, Math.min(300, scalePercent));
    scaleInput.value = scalePercent;
    const savedPage = parseInt(pageInput.value) || 1;
    renderAllPages();
    // Scroll back after re-render
    setTimeout(function () { scrollToPage(savedPage); }, 100);
  }

  zoomInBtn.addEventListener('click',  function () { scalePercent = Math.round(scalePercent / 10) * 10 + 10; applyZoom(); });
  zoomOutBtn.addEventListener('click', function () { scalePercent = Math.round(scalePercent / 10) * 10 - 10; applyZoom(); });
  scaleInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { scalePercent = parseInt(this.value) || 100; applyZoom(); }
  });
  scaleInput.addEventListener('blur', function () {
    scalePercent = parseInt(this.value) || 100; applyZoom();
  });

  // ── Search ──
  searchToggle.addEventListener('click', function (e) {
    e.stopPropagation();
    searchModal.classList.add('open');
    searchToggle.classList.add('active');
    setTimeout(function () { searchInput.focus(); }, 50);
  });

  function closeModal() {
    searchModal.classList.remove('open');
    searchToggle.classList.remove('active');
    clearSearch();
  }

  searchClose.addEventListener('click', closeModal);

  // Tutup kalau klik di luar modal
  document.addEventListener('click', function (e) {
    if (searchModal.classList.contains('open') &&
        !searchModal.contains(e.target)) {
      closeModal();
    }
  });

  let searchDebounce;
  searchInput.addEventListener('input', function () {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(doSearch, 250);
  });
  searchInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.shiftKey ? navigateSearch(-1) : navigateSearch(1); }
    if (e.key === 'Escape') closeModal();
  });
  searchPrev.addEventListener('click', function () { navigateSearch(-1); });
  searchNext.addEventListener('click', function () { navigateSearch(1); });

  function doSearch() {
    clearHighlights();
    searchMatches = [];
    searchCurrent = -1;
    searchResults.querySelectorAll('.result-item').forEach(function (el) { el.remove(); });
    searchEmpty.style.display = 'none';

    const query = searchInput.value.trim().toLowerCase();
    if (!query) {
      searchCount.textContent = '';
      searchPrev.disabled = true;
      searchNext.disabled = true;
      return;
    }

    for (let p = 1; p <= totalPages; p++) {
      if (!pageTexts[p]) continue;
      const items  = pageTexts[p];
      const pw     = pageWraps[p];
      if (!pw) continue;

      // CSS size of the rendered canvas
      const canvas  = pw.wrap.querySelector('canvas');
      const cssW    = parseFloat(canvas.style.width);
      const cssH    = parseFloat(canvas.style.height);
      // viewport was rendered at scale * DPR, so CSS pixel = viewport_unit / DPR
      const { viewport } = pw;
      const vpW = viewport.width  / DPR;
      const vpH = viewport.height / DPR;

      items.forEach(function (item) {
        if (!item.str) return;
        const text = item.str.toLowerCase();
        let idx = 0;
        while ((idx = text.indexOf(query, idx)) !== -1) {
          const tx = item.transform; // [a, b, c, d, e, f]  — e=x, f=y in PDF units

          // Convert PDF-space point to viewport CSS pixels
          // PDF.js viewport: origin bottom-left, Y flipped
          // tx[0]=scaleX, tx[3]=scaleY (font size factor), tx[4]=x, tx[5]=y
          const pdfX = tx[4];
          const pdfY = tx[5];
          // Use viewport transform directly
          const pt = viewport.convertToViewportPoint(pdfX, pdfY);
          // pt is in viewport units (width/height = viewport.width, viewport.height)
          // convert to CSS pixels
          const cx = pt[0] / DPR;
          const cy = pt[1] / DPR;

          // Height of the glyph in CSS px
          const glyphH = Math.abs(tx[3]) * Math.abs(viewport.transform[3]) / DPR;
          // Width per character
          const totalW = item.width  * Math.abs(viewport.transform[0]) / DPR;
          const charW  = totalW / (item.str.length || 1);
          const matchW = charW * query.length;

          const left = cx + idx * charW;
          const top  = cy - glyphH;

          const matchIdx = searchMatches.length;
          searchMatches.push({ page: p, left, top, width: Math.max(matchW, 4), height: glyphH + 2 });

          // Result item in modal
          const div = document.createElement('div');
          div.className = 'result-item';
          div.dataset.idx = matchIdx;

          const before = item.str.slice(0, idx);
          const match  = item.str.slice(idx, idx + query.length);
          const after  = item.str.slice(idx + query.length);

          div.innerHTML = `
            <span class="result-page">Hal. ${p}</span>
            <span class="result-text">${escHtml(before)}<mark>${escHtml(match)}</mark>${escHtml(after)}</span>`;

          div.addEventListener('click', function () {
            searchCurrent = parseInt(this.dataset.idx);
            activateMatch(searchCurrent);
            updateCount();
          });

          searchResults.appendChild(div);
          idx++;
        }
      });
    }

    if (searchMatches.length === 0) {
      searchEmpty.style.display = 'block';
      searchCount.textContent = 'Tidak ditemukan';
      searchPrev.disabled = true;
      searchNext.disabled = true;
    } else {
      searchPrev.disabled = false;
      searchNext.disabled = false;
      searchCurrent = 0;
      drawHighlights();
      activateMatch(0);
      updateCount();
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function updateCount() {
    searchCount.textContent = searchMatches.length > 0
      ? (searchCurrent + 1) + ' / ' + searchMatches.length
      : '';
  }

  function drawHighlights() {
    clearHighlights();
    searchMatches.forEach(function (m, i) {
      const pw = pageWraps[m.page];
      if (!pw) return;
      const hl = document.createElement('div');
      hl.className = 'search-highlight' + (i === searchCurrent ? ' current' : '');
      hl.style.cssText = `left:${m.left}px;top:${m.top}px;width:${m.width}px;height:${m.height}px;`;
      hl.dataset.matchIdx = i;
      pw.hlLayer.appendChild(hl);
    });
  }

  function clearHighlights() {
    document.querySelectorAll('.textLayer').forEach(function (el) { el.innerHTML = ''; });
  }

  function navigateSearch(dir) {
    if (searchMatches.length === 0) return;
    searchCurrent = (searchCurrent + dir + searchMatches.length) % searchMatches.length;
    drawHighlights();
    activateMatch(searchCurrent);
    updateCount();
  }

  function activateMatch(idx) {
    // Highlight active in result list
    searchResults.querySelectorAll('.result-item').forEach(function (el) {
      el.classList.toggle('active', parseInt(el.dataset.idx) === idx);
    });
    // Scroll result item into view inside modal
    const activeItem = searchResults.querySelector('.result-item.active');
    if (activeItem) activeItem.scrollIntoView({ block: 'nearest' });

    // Scroll PDF ke posisi teks yang tepat
    const m = searchMatches[idx];
    if (!m) return;
    const pw = pageWraps[m.page];
    if (!pw) return;

    // getBoundingClientRect relatif ke viewport, scroll.scrollTop untuk absolut
    const pageRect   = pw.wrap.getBoundingClientRect();
    const scrollRect = scroll.getBoundingClientRect();
    // posisi top teks relatif ke scroll container
    const textAbsTop = scroll.scrollTop + (pageRect.top - scrollRect.top) + m.top;
    const TOPBAR_H   = 52;
    const PADDING    = 48;
    scroll.scrollTo({ top: textAbsTop - TOPBAR_H - PADDING, behavior: 'smooth' });
    pageInput.value = m.page;
    drawHighlights();
  }

  function clearSearch() {
    searchInput.value = '';
    searchMatches = [];
    searchCurrent = -1;
    searchCount.textContent = '';
    searchPrev.disabled = true;
    searchNext.disabled = true;
    clearHighlights();
    searchResults.querySelectorAll('.result-item').forEach(function (el) { el.remove(); });
    searchEmpty.style.display = 'none';
  }

  // Ctrl+F / Cmd+F shortcut
  document.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
      e.preventDefault();
      searchModal.classList.add('open');
      searchToggle.classList.add('active');
      setTimeout(function () { searchInput.focus(); }, 50);
    }
  });
  function showError(t, detail) {
    scroll.innerHTML = `
      <div class="state-wrap">
        <div class="state-icon">📄</div>
        <h2>${t}</h2><p>${detail}</p>
        <a href="../index.html#portofolio"
           style="margin-top:1rem;padding:0.55rem 1.25rem;background:rgba(255,255,255,0.08);
                  border:1px solid rgba(255,255,255,0.2);border-radius:999px;
                  color:#ccc;font-size:0.82rem;text-decoration:none;">← Kembali</a>
      </div>`;
  }
})();
</script>
</body>
</html>
